<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yogi · Innovation Room · 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:        #2C4C79;
      --honey:       #FEBD33;
      --teal:        #43C0BE;
      --dark-teal:   #007F7E;
      --sky:         #64BCEA;
      --red:         #E04B51;
      --violet:      #9B7BD4;
      --coral:       #F39B5A;

      --bg:          #0a0d12;
      --bg-elev:     #11161f;
      --bg-glass:    rgba(255,255,255,0.04);
      --border:      rgba(255,255,255,0.08);
      --border-warm: rgba(254,189,51,0.25);

      --fg:          #f4f4f5;
      --fg-muted:    #a1a1aa;
      --fg-dim:      #71717a;

      --font-display: 'Inter', system-ui, -apple-system, 'SF Pro Display', sans-serif;
      --font-mono:   'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    }
    *,*::before,*::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-display);
      font-feature-settings: 'ss01','cv11';
      letter-spacing: -0.01em;
      overflow: hidden;
      height: 100vh; width: 100vw;
    }
    .deck {
      position: relative; height: 100vh; width: 100vw;
      overflow: hidden;
    }
    .slide {
      position: absolute; inset: 0;
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s cubic-bezier(.4,0,.2,1);
      display: flex; align-items: center; justify-content: center;
      padding: 4vmin;
    }
    .slide.active {
      opacity: 1; pointer-events: auto;
      z-index: 10;
    }
    .slide .content {
      width: 100%; max-width: 1600px;
    }

    /* Top chrome */
    .top-chrome {
      position: fixed; top: 20px; left: 24px; right: 24px;
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-mono); font-size: 10px;
      color: var(--fg-dim); letter-spacing: 0.12em; text-transform: uppercase;
      z-index: 100; pointer-events: none;
    }
    .top-chrome .l { color: var(--honey); }

    /* Progress */
    .progress {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 2px; background: rgba(255,255,255,0.05);
      z-index: 100;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--honey), var(--teal));
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 12px rgba(254,189,51,0.6);
    }

    /* Dots */
    .dots {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 100;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      cursor: pointer;
      transition: all 0.3s;
    }
    .dot.active { background: var(--honey); width: 24px; border-radius: 3px; box-shadow: 0 0 8px var(--honey); }
    .dot:hover { background: var(--fg-muted); }

    /* Nav arrows */
    .nav-arrow {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-glass);
      backdrop-filter: blur(8px);
      color: var(--fg-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; transition: all 0.2s;
      font-size: 18px;
    }
    .nav-arrow:hover { color: var(--honey); border-color: var(--border-warm); background: rgba(254,189,51,0.05); }
    .nav-arrow.prev { left: 24px; }
    .nav-arrow.next { right: 24px; }

    /* Bottom-right meta */
    .meta-chrome {
      position: fixed; bottom: 22px; right: 24px;
      font-family: var(--font-mono); font-size: 10px;
      color: var(--fg-dim); letter-spacing: 0.1em;
      z-index: 100;
    }

    /* Play button — manual audio trigger */
    .vo-play {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid var(--border-warm);
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      color: var(--fg);
      font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; z-index: 100;
      transition: all 0.2s;
    }
    .vo-play:hover {
      border-color: var(--honey);
      background: rgba(254,189,51,0.08);
      box-shadow: 0 0 16px rgba(254,189,51,0.3);
    }
    .vo-play .icon {
      width: 14px; height: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--honey);
    }
    .vo-play.playing .icon-play { display: none; }
    .vo-play:not(.playing) .icon-pause { display: none; }
    .vo-play .label-play { display: inline; }
    .vo-play .label-pause { display: none; }
    .vo-play.playing .label-play { display: none; }
    .vo-play.playing .label-pause { display: inline; }

    /* Loader fallback */
    .loader {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--fg-dim);
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em;
      z-index: 1000;
    }
    .loader.hidden { display: none; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="loader" id="loader">LOADING SLIDES…</div>

  <div class="top-chrome">
    <div><span class="l">🐻 YOGI</span> · INNOVATION ROOM · 24 MAY 2026</div>
    <div id="slide-marker">SLIDE 01 / 10</div>
  </div>

  <div class="deck" id="deck"></div>

  <button class="nav-arrow prev" id="prev" title="Previous (←)">‹</button>
  <button class="nav-arrow next" id="next" title="Next (→)">›</button>

  <div class="dots" id="dots"></div>

  <div class="meta-chrome">ASH WILLIAMS · INNOVATION & TRANSFORMATION</div>

  <button class="vo-play" id="vo-play" title="Play / pause Yogi voice (M to mute)" aria-label="Play voice">
    <span class="icon icon-play"><svg width="10" height="11" viewBox="0 0 10 11" fill="currentColor" aria-hidden="true"><path d="M1 1 L9 5.5 L1 10 Z"/></svg></span>
    <span class="icon icon-pause"><svg width="10" height="11" viewBox="0 0 10 11" fill="currentColor" aria-hidden="true"><rect x="1" y="1" width="3" height="9"/><rect x="6" y="1" width="3" height="9"/></svg></span>
    <span class="label-play">Play Yogi</span>
    <span class="label-pause">Pause</span>
  </button>

  <audio id="vo" preload="auto"></audio>

  <div class="progress"><div class="progress-fill" id="progress-fill"></div></div>

  <script>
    // Hooks slides can register
    window.onSlideEnter = {};
    window.onSlideLeave = {};

    const TOTAL = 10;
    const deck = document.getElementById('deck');
    const vo = document.getElementById('vo');
    const dots = document.getElementById('dots');
    const slideMarker = document.getElementById('slide-marker');
    const progressFill = document.getElementById('progress-fill');
    const loader = document.getElementById('loader');

    let current = 1;
    const slides = {}; // index -> section element

    async function loadSlides(){
      for (let i = 1; i <= TOTAL; i++) {
        const num = String(i).padStart(2,'0');
        try {
          const r = await fetch(`slides/slide-${num}.html`);
          if (!r.ok) throw new Error('not found');
          const html = await r.text();
          const wrap = document.createElement('div');
          wrap.innerHTML = html.trim();
          const section = wrap.querySelector('section.slide') || wrap.firstChild;
          if (!section.classList.contains('slide')) {
            const fallback = document.createElement('section');
            fallback.className = 'slide';
            fallback.dataset.audio = num;
            fallback.appendChild(section);
            deck.appendChild(fallback);
            slides[i] = fallback;
          } else {
            deck.appendChild(section);
            slides[i] = section;
          }
        } catch(e) {
          const placeholder = document.createElement('section');
          placeholder.className = 'slide';
          placeholder.dataset.audio = num;
          placeholder.innerHTML = `<div class="content" style="text-align:center;color:var(--fg-dim);font-family:var(--font-mono)">SLIDE ${num} — PENDING</div>`;
          deck.appendChild(placeholder);
          slides[i] = placeholder;
        }
      }
      loader.classList.add('hidden');
      renderDots();
      goTo(1);
    }

    function renderDots(){
      dots.innerHTML = '';
      for (let i = 1; i <= TOTAL; i++) {
        const d = document.createElement('div');
        d.className = 'dot' + (i === current ? ' active' : '');
        d.dataset.idx = i;
        d.onclick = () => goTo(i);
        dots.appendChild(d);
      }
    }

    function updateDots(){
      [...dots.children].forEach((d,idx) => d.classList.toggle('active', idx+1 === current));
    }

    function goTo(n){
      if (n < 1 || n > TOTAL) return;
      if (slides[current] && window.onSlideLeave[current]) {
        try { window.onSlideLeave[current](); } catch(e) { console.warn(e); }
      }
      Object.values(slides).forEach(s => s.classList.remove('active'));
      slides[n].classList.add('active');
      current = n;
      slideMarker.textContent = `SLIDE ${String(n).padStart(2,'0')} / ${TOTAL}`;
      progressFill.style.width = ((n-1)/(TOTAL-1) * 100) + '%';
      updateDots();
      loadAudio(slides[n].dataset.audio);
      if (window.onSlideEnter[n]) {
        try { window.onSlideEnter[n](); } catch(e) { console.warn(e); }
      }
    }

    function loadAudio(key){
      if (!key) return;
      vo.src = `assets/audio/slide-${key}.mp3`;
      vo.pause();
      vo.currentTime = 0;
      voPlayBtn.classList.remove('playing');
    }

    const voPlayBtn = document.getElementById('vo-play');
    voPlayBtn.onclick = () => {
      if (vo.paused) {
        vo.play().then(() => voPlayBtn.classList.add('playing')).catch(()=>{});
      } else {
        vo.pause();
        voPlayBtn.classList.remove('playing');
      }
    };
    vo.onended = () => voPlayBtn.classList.remove('playing');
    vo.onpause = () => voPlayBtn.classList.remove('playing');
    vo.onplay = () => voPlayBtn.classList.add('playing');

    document.getElementById('prev').onclick = () => goTo(current - 1);
    document.getElementById('next').onclick = () => goTo(current + 1);

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); goTo(current + 1); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); goTo(current - 1); }
      else if (e.key === 'Home') goTo(1);
      else if (e.key === 'End') goTo(TOTAL);
      else if (e.key === 'f' || e.key === 'F') {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }
      else if (e.key === 'm' || e.key === 'M') vo.muted = !vo.muted;
    });

    loadSlides();
  </script>
</body>
</html>
