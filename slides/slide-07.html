  <!-- HUD: top-left -->

    <div class="br-eyebrow">
      <span class="dot"></span>
      <span>THE BRAIN · YOGI INSIDE TC WORKSPACES</span>

    <div class="br-title">
      <b>1,500 neural nodes</b> · <b>328 MCP tools</b> · <b>9 enterprise systems</b>

  <!-- HUD: top-right (single live legend) -->
  <div class="br-hud-tr" aria-hidden="true">
    <span class="led"></span>
    <span class="head">LIVE</span>
    <span class="sep"></span>
    <span>DRAG TO ROTATE</span>
    <span class="sep"></span>
    <span>SCROLL TO ZOOM</span>

  <!-- Bottom: just the 9 system names -->
  <div class="br-bottom">
    <div class="eb"><b>WIRED IN</b>9 ENTERPRISE SYSTEMS · 328 MCP TOOLS · ONE BRAIN</div>
    <div class="row" id="brain-system-row"></div>
  </div>

  <!-- System labels (populated by JS) -->
  <div id="brain-system-labels"></div>

  <script>
    (function () {
      window.onSlideEnter = window.onSlideEnter || {};
      window.onSlideLeave = window.onSlideLeave || {};

      let state = null;

      function loadThree(cb) {
        if (window.THREE) { cb(); return; }
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js';
        s.onload = cb;
        s.onerror = () => console.error('[slide-07 brain] failed to load three.js');
        document.head.appendChild(s);
      }

      function initBrain() {
        const wrap = document.getElementById('brain-canvas-wrap');
        if (!wrap || !window.THREE) return;
        const THREE = window.THREE;

        // -------- Brand palette ---------------------------------
        const HONEY      = 0xFEBD33;
        const HONEY_WARM = 0xF39B5A;
        const TEAL       = 0x43C0BE;
        const DARK_TEAL  = 0x007F7E;
        const SKY        = 0x64BCEA;
        const RED        = 0xE04B51;
        const VIOLET     = 0x9B7BD4;
        const CORAL      = 0xF39B5A;
        const NAVY       = 0x2C4C79;

        // -------- 9 enterprise systems --------------------------
        const SYSTEMS = [
          { name: 'Zoho',            tag: 'CRM',       color: HONEY },
          { name: 'Databricks',      tag: 'WAREHOUSE', color: SKY },
          { name: 'MYOB',            tag: 'FINANCE',   color: RED },
          { name: 'EzyCollect',      tag: 'COLLECT',   color: DARK_TEAL },
          { name: 'Employment Hero', tag: 'HRIS',      color: HONEY_WARM },
          { name: 'Aircall',         tag: 'TELEPHONY', color: CORAL },
          { name: 'Microsoft 365',   tag: 'OFFICE',    color: TEAL },
          { name: 'SharePoint',      tag: 'DOCS',      color: TEAL },
          { name: 'Confluence',      tag: 'KNOWLEDGE', color: VIOLET }
        ];

        // Populate the bottom row
        (function buildBottomRow() {
          const row = document.getElementById('brain-system-row');
          if (!row) return;
          row.innerHTML = '';
          for (const s of SYSTEMS) {
            const span = document.createElement('span');
            span.className = 'sys';
            const colHex = '#' + s.color.toString(16).padStart(6, '0');
            span.style.setProperty('--c', colHex);
            span.innerHTML = '<span class="sw"></span><span class="nm">' + s.name + '</span>';
            row.appendChild(span);
          }
        })();

        // -------- Reduced motion --------------------------------
        const reduced = window.matchMedia &&
                        window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // -------- Constants -------------------------------------
        const SURFACE_NODES   = 1500;          // dots ON the brain surface
        const MCP_CLUSTERS    = 24;            // grouped MCP orbs in a ring
        const SYSTEMS_RADIUS  = 22;            // outer constellation radius
        const MCP_RING_RADIUS = 13.5;          // MCP orbital ring radius
        const STAR_COUNT      = 220;

        // Brain anatomical extents — two squashed hemispheres joined.
        // Half-extents PER hemisphere ellipsoid:
        const HEMI_RX = 3.0;
        const HEMI_RY = 2.7;
        const HEMI_RZ = 3.8;
        const HEMI_OFFSET_X = 1.55;   // hemisphere center X offset

        // -------- Renderer / Scene / Camera ---------------------
        const renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: false,
          powerPreference: 'high-performance'
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        let viewW = wrap.clientWidth, viewH = wrap.clientHeight;
        renderer.setSize(viewW, viewH, false);
        renderer.setClearColor(0x05070C, 1);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.10;
        wrap.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x05070C, 32, 70);

        const camera = new THREE.PerspectiveCamera(50, viewW / viewH, 0.1, 240);
        camera.position.set(0, 2.0, 42);
        camera.lookAt(0, 0, 0);

        // -------- Soft sky dome ---------------------------------
        {
          const skyGeo = new THREE.SphereGeometry(90, 24, 24);
          const skyMat = new THREE.ShaderMaterial({
            side: THREE.BackSide,
            depthWrite: false,
            uniforms: {
              uTop:    { value: new THREE.Color(0x2C4C79).multiplyScalar(0.42) },
              uBottom: { value: new THREE.Color(0x05070C) }
            },
            vertexShader:
              'varying vec3 vW;' +
              'void main(){ vW = position;' +
              'gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
            fragmentShader:
              'varying vec3 vW; uniform vec3 uTop; uniform vec3 uBottom;' +
              'void main(){' +
              ' float t = clamp(vW.y * 0.5 + 0.5, 0.0, 1.0);' +
              ' t = smoothstep(0.05, 0.95, t);' +
              ' gl_FragColor = vec4(mix(uBottom, uTop, t), 1.0);' +
              '}'
          });
          scene.add(new THREE.Mesh(skyGeo, skyMat));
        }

        // -------- Starfield (tiny + dim) ------------------------
        {
          const sg = new THREE.BufferGeometry();
          const pos = new Float32Array(STAR_COUNT * 3);
          for (let i = 0; i < STAR_COUNT; i++) {
            const r = 38 + Math.random() * 28;
            const th = Math.random() * Math.PI * 2;
            const ph = Math.acos(2 * Math.random() - 1);
            pos[i*3+0] = r * Math.sin(ph) * Math.cos(th);
            pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
            pos[i*3+2] = r * Math.cos(ph);
          }
          sg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
          const sm = new THREE.PointsMaterial({
            color: 0xC7D6EA,
            size: 0.05,
            sizeAttenuation: true,
            transparent: true,
            opacity: 0.5,
            depthWrite: false
          });
          scene.add(new THREE.Points(sg, sm));
        }

        // -------- Lighting --------------------------------------
        scene.add(new THREE.AmbientLight(0xffffff, 0.32));
        const keyHoney = new THREE.PointLight(HONEY, 36, 50, 2);
        keyHoney.position.set(-2.5, 5, 5);
        scene.add(keyHoney);
        const fillCoral = new THREE.PointLight(HONEY_WARM, 18, 50, 2);
        fillCoral.position.set(3.5, -1.5, 5);
        scene.add(fillCoral);
        const rimSky = new THREE.PointLight(SKY, 16, 60, 2);
        rimSky.position.set(-12, 1, -10);
        scene.add(rimSky);
        const rimTeal = new THREE.PointLight(TEAL, 14, 60, 2);
        rimTeal.position.set(11, 1, -8);
        scene.add(rimTeal);

        // -------- Reusable radial sprite texture ----------------
        function makeRadialTexture() {
          const size = 128;
          const c = document.createElement('canvas');
          c.width = c.height = size;
          const ctx = c.getContext('2d');
          const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
          g.addColorStop(0.0,  'rgba(255,255,255,1)');
          g.addColorStop(0.18, 'rgba(255,255,255,0.55)');
          g.addColorStop(0.45, 'rgba(255,255,255,0.18)');
          g.addColorStop(1.0,  'rgba(255,255,255,0)');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, size, size);
          const tex = new THREE.CanvasTexture(c);
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.needsUpdate = true;
          return tex;
        }
        const sharedRadialTex = makeRadialTexture();

        // -------- Brain root (rotates as one) -------------------
        const brainRoot = new THREE.Group();
        brainRoot.rotation.x = THREE.MathUtils.degToRad(-8);
        scene.add(brainRoot);

        // -------- Deterministic noise ---------------------------
        // 3D value-noise from hashed sines. Good enough for surface
        // bumpiness — we don't need Perlin quality here.
        function hash3(x, y, z) {
          const s = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453;
          return s - Math.floor(s);
        }
        function smoothNoise(x, y, z) {
          const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
          const fx = x - ix, fy = y - iy, fz = z - iz;
          // Smoothstep weights
          const sx = fx*fx*(3-2*fx), sy = fy*fy*(3-2*fy), sz = fz*fz*(3-2*fz);
          function mix(a,b,t){ return a*(1-t)+b*t; }
          const c000 = hash3(ix,   iy,   iz);
          const c100 = hash3(ix+1, iy,   iz);
          const c010 = hash3(ix,   iy+1, iz);
          const c110 = hash3(ix+1, iy+1, iz);
          const c001 = hash3(ix,   iy,   iz+1);
          const c101 = hash3(ix+1, iy,   iz+1);
          const c011 = hash3(ix,   iy+1, iz+1);
          const c111 = hash3(ix+1, iy+1, iz+1);
          const x00 = mix(c000, c100, sx);
          const x10 = mix(c010, c110, sx);
          const x01 = mix(c001, c101, sx);
          const x11 = mix(c011, c111, sx);
          const y0  = mix(x00, x10, sy);
          const y1  = mix(x01, x11, sy);
          return mix(y0, y1, sz);
        }
        function fbm(x, y, z) {
          let v = 0, amp = 0.5, freq = 1.0;
          for (let i = 0; i < 3; i++) {
            v += amp * smoothNoise(x*freq, y*freq, z*freq);
            amp *= 0.5; freq *= 2.0;
          }
          return v;
        }

        // -------- Brain mesh ------------------------------------
        // Strategy: build a high-res IcosahedronGeometry, then per-
        // vertex remap to the nearest point on a twin-hemisphere
        // ellipsoid surface, then apply gyri/sulci displacement via
        // fbm noise along the surface normal.
        //
        // For each vertex (vx,vy,vz):
        //   - Pick the hemisphere by sign of vx
        //   - Local pos relative to hemisphere center = (vx ± offset, vy, vz)
        //   - Normalize local pos to a sphere direction
        //   - Project onto ellipsoid (multiply by radii)
        //   - Add fbm displacement along outward normal
        //   - Pinch the central slit (longitudinal fissure)
        function buildBrainGeometry(detail) {
          const g = new THREE.IcosahedronGeometry(1, detail);
          const pos = g.attributes.position;
          const arr = pos.array;
          for (let i = 0; i < pos.count; i++) {
            const vx = arr[i*3+0];
            const vy = arr[i*3+1];
            const vz = arr[i*3+2];

            // Hemisphere selection
            const left = vx < 0;
            const cx = left ? -HEMI_OFFSET_X : HEMI_OFFSET_X;

            // Direction from hemisphere center (use original sphere dir
            // but biased so the slit between hemispheres is pinched)
            let dx = vx;
            let dy = vy;
            let dz = vz;
            const dlen = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
            dx /= dlen; dy /= dlen; dz /= dlen;

            // Re-bias direction so the inner (medial) face curves inward,
            // creating the central fissure. We squash X-direction toward
            // the hemisphere's outward side.
            const medialPull = left ? Math.max(0, dx + 0.0) : Math.max(0, -dx + 0.0);
            // medialPull is positive on the medial face.
            // Apply a pinch factor toward the hemisphere center:
            const pinch = 1.0 - medialPull * 0.45;

            // Ellipsoid scaling
            let x = cx + dx * HEMI_RX * pinch;
            let y =       dy * HEMI_RY;
            let z =       dz * HEMI_RZ;

            // Flatten bottom slightly (brain isn't quite an ellipsoid)
            if (y < 0) y *= 0.92;

            // Gyri / sulci displacement
            // High-frequency noise along outward normal.
            const nfreq = 2.4;
            const nx = x * nfreq, ny = y * nfreq, nz = z * nfreq;
            const n = fbm(nx, ny, nz) * 2 - 1; // -1..+1
            // Outward normal = direction from hemisphere center, then renormalize
            let outX = x - cx;
            let outY = y;
            let outZ = z;
            const outLen = Math.sqrt(outX*outX + outY*outY + outZ*outZ) || 1;
            outX /= outLen; outY /= outLen; outZ /= outLen;
            const disp = n * 0.22; // amplitude of gyri
            x += outX * disp;
            y += outY * disp;
            z += outZ * disp;

            // Brain stem nudge — pinch lower-back slightly
            if (y < -1.6 && z < -1.4) {
              x *= 0.7; y = Math.max(y, -2.4);
            }

            arr[i*3+0] = x;
            arr[i*3+1] = y;
            arr[i*3+2] = z;
          }
          pos.needsUpdate = true;
          g.computeVertexNormals();
          return g;
        }

        const brainGeom = buildBrainGeometry(5); // 5 = good gyri detail

        // Translucent honey-tinted solid pass
        const brainSolidMat = new THREE.MeshStandardMaterial({
          color: 0x2a1f10,
          emissive: 0x6a4615,
          emissiveIntensity: 0.55,
          roughness: 0.55,
          metalness: 0.15,
          transparent: true,
          opacity: 0.78,
          side: THREE.FrontSide
        });
        const brainSolid = new THREE.Mesh(brainGeom, brainSolidMat);
        brainRoot.add(brainSolid);

        // Wireframe overlay — the "neural mesh" signal
        const brainWireGeom = new THREE.WireframeGeometry(brainGeom);
        const brainWireMat = new THREE.LineBasicMaterial({
          color: HONEY,
          transparent: true,
          opacity: 0.45,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        const brainWire = new THREE.LineSegments(brainWireGeom, brainWireMat);
        brainRoot.add(brainWire);

        // Inner luminescence — back-face additive copy gives an
        // internal glow that hints at consciousness inside the mesh.
        const brainInnerMat = new THREE.MeshBasicMaterial({
          color: HONEY,
          transparent: true,
          opacity: 0.10,
          depthWrite: false,
          side: THREE.BackSide,
          blending: THREE.AdditiveBlending
        });
        const brainInner = new THREE.Mesh(brainGeom, brainInnerMat);
        brainInner.scale.setScalar(0.96);
        brainRoot.add(brainInner);

        // Central honey ember at brain center — the "thinking source"
        let coreEmber = null;
        let coreCorona = null;
        {
          coreEmber = new THREE.Mesh(
            new THREE.IcosahedronGeometry(0.34, 1),
            new THREE.MeshStandardMaterial({
              color: HONEY,
              emissive: HONEY,
              emissiveIntensity: 1.8,
              roughness: 0.22,
              metalness: 0.18
            })
          );
          brainRoot.add(coreEmber);
          coreCorona = new THREE.Sprite(new THREE.SpriteMaterial({
            map: sharedRadialTex,
            color: HONEY,
            transparent: true,
            opacity: 0.48,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          }));
          coreCorona.scale.set(2.6, 2.6, 1);
          brainRoot.add(coreCorona);
        }

        // -------- Surface-locked neural nodes -------------------
        // Sample 1,500 candidate points on the same ellipsoid+noise
        // surface used by the mesh. They sit slightly outside the
        // mesh skin so they read as firing on the surface, not inside.
        const surfaceNodeData = [];   // {pos:Vector3, isLeft, phase}
        let surfaceInst = null;
        {
          const geo = new THREE.SphereGeometry(1, 6, 5);
          const mat = new THREE.MeshBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.95,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          });
          surfaceInst = new THREE.InstancedMesh(geo, mat, SURFACE_NODES);
          surfaceInst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

          const colors = new Float32Array(SURFACE_NODES * 3);
          const cLeft  = new THREE.Color(HONEY);
          const cRight = new THREE.Color(HONEY_WARM);
          const tmpMat = new THREE.Matrix4();
          const tmpPos = new THREE.Vector3();
          const tmpQuat = new THREE.Quaternion();
          const tmpScale = new THREE.Vector3();
          tmpQuat.identity();

          function hash01(i, salt) {
            const v = Math.sin((i + 1) * 12.9898 + salt * 78.233) * 43758.5453;
            return v - Math.floor(v);
          }

          for (let i = 0; i < SURFACE_NODES; i++) {
            // Choose hemisphere
            const left = hash01(i, 1.0) < 0.5;
            const cx = left ? -HEMI_OFFSET_X : HEMI_OFFSET_X;

            // Random direction biased outward (medial pull)
            const u = hash01(i, 2.7) * 2 - 1;
            const th = hash01(i, 3.3) * Math.PI * 2;
            const s = Math.sqrt(1 - u*u);
            let dx = s * Math.cos(th);
            let dy = u;
            let dz = s * Math.sin(th);

            // Bias direction toward outward face (less medial)
            if (left  && dx > 0) dx *= 0.35;
            if (!left && dx < 0) dx *= 0.35;
            const dlen = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
            dx /= dlen; dy /= dlen; dz /= dlen;

            // Ellipsoid surface point
            let x = cx + dx * HEMI_RX;
            let y =       dy * HEMI_RY;
            let z =       dz * HEMI_RZ;
            if (y < 0) y *= 0.92;

            // Add same noise displacement so dots ride the gyri
            const nfreq = 2.4;
            const nv = fbm(x * nfreq, y * nfreq, z * nfreq) * 2 - 1;
            let outX = x - cx, outY = y, outZ = z;
            const ol = Math.sqrt(outX*outX + outY*outY + outZ*outZ) || 1;
            outX /= ol; outY /= ol; outZ /= ol;
            const disp = nv * 0.22 + 0.04; // slightly outside skin
            x += outX * disp;
            y += outY * disp;
            z += outZ * disp;

            const sz = 0.038 + hash01(i, 11.7) * 0.028;
            tmpPos.set(x, y, z);
            tmpScale.set(sz, sz, sz);
            tmpMat.compose(tmpPos, tmpQuat, tmpScale);
            surfaceInst.setMatrixAt(i, tmpMat);

            const col = left ? cLeft : cRight;
            // Per-node brightness variation
            const j = hash01(i, 12.9) * 0.25 - 0.12;
            colors[i*3+0] = Math.min(1, Math.max(0, col.r + j));
            colors[i*3+1] = Math.min(1, Math.max(0, col.g + j * 0.7));
            colors[i*3+2] = Math.min(1, Math.max(0, col.b + j * 0.4));

            surfaceNodeData.push({
              x: x, y: y, z: z,
              left: left,
              size: sz,
              phase: hash01(i, 17.3) * Math.PI * 2
            });
          }
          surfaceInst.instanceColor = new THREE.InstancedBufferAttribute(colors, 3);
          surfaceInst.instanceMatrix.needsUpdate = true;
          surfaceInst.instanceColor.needsUpdate = true;
          mat.vertexColors = true;
          mat.needsUpdate = true;
          brainRoot.add(surfaceInst);
        }

        // -------- 24 MCP cluster orbs in a tilted ring ---------
        // These represent the 328 MCP tools grouped into 24 clusters
        // (~14 tools per cluster). Tilted ring just outside the brain.
        let mcpInst = null;
        const mcpPhases = new Float32Array(MCP_CLUSTERS);
        const mcpBaseAngles = new Float32Array(MCP_CLUSTERS);
        const mcpRing = new THREE.Group();
        // Tilt the ring — looks more cinematic than a flat orbit
        mcpRing.rotation.x = THREE.MathUtils.degToRad(22);
        mcpRing.rotation.z = THREE.MathUtils.degToRad(-7);
        scene.add(mcpRing);
        {
          const geo = new THREE.SphereGeometry(1, 14, 14);
          const mat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0xffffff,
            emissiveIntensity: 1.0,
            roughness: 0.35,
            metalness: 0.2,
            vertexColors: false
          });
          mcpInst = new THREE.InstancedMesh(geo, mat, MCP_CLUSTERS);
          mcpInst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

          const colors = new Float32Array(MCP_CLUSTERS * 3);
          // Palette cycles through brand accents
          const palette = [
            new THREE.Color(HONEY),
            new THREE.Color(SKY),
            new THREE.Color(TEAL),
            new THREE.Color(VIOLET),
            new THREE.Color(CORAL),
            new THREE.Color(HONEY_WARM)
          ];

          const tmpMat = new THREE.Matrix4();
          const tmpPos = new THREE.Vector3();
          const tmpQuat = new THREE.Quaternion();
          tmpQuat.identity();
          const tmpScale = new THREE.Vector3();

          for (let i = 0; i < MCP_CLUSTERS; i++) {
            const ang = (i / MCP_CLUSTERS) * Math.PI * 2;
            mcpBaseAngles[i] = ang;
            const x = Math.cos(ang) * MCP_RING_RADIUS;
            const z = Math.sin(ang) * MCP_RING_RADIUS;
            const y = 0;
            const sz = 0.16 + (i % 5) * 0.012;
            tmpPos.set(x, y, z);
            tmpScale.set(sz, sz, sz);
            tmpMat.compose(tmpPos, tmpQuat, tmpScale);
            mcpInst.setMatrixAt(i, tmpMat);

            const col = palette[i % palette.length];
            colors[i*3+0] = col.r;
            colors[i*3+1] = col.g;
            colors[i*3+2] = col.b;
            mcpPhases[i] = (i / MCP_CLUSTERS) * Math.PI * 2;
          }
          mcpInst.instanceColor = new THREE.InstancedBufferAttribute(colors, 3);
          mcpInst.instanceMatrix.needsUpdate = true;
          mcpInst.instanceColor.needsUpdate = true;
          mat.vertexColors = true;
          mat.needsUpdate = true;
          mcpRing.add(mcpInst);
        }

        // -------- 9 enterprise system orbs (outer constellation) -
        const systemNodes = [];
        const systemLabelsHost = document.getElementById('brain-system-labels');
        {
          const ringTilt = THREE.MathUtils.degToRad(14);
          for (let i = 0; i < SYSTEMS.length; i++) {
            const sys = SYSTEMS[i];
            const ang = (i / SYSTEMS.length) * Math.PI * 2 - Math.PI / 2;
            const x = Math.cos(ang) * SYSTEMS_RADIUS;
            const z = Math.sin(ang) * SYSTEMS_RADIUS;
            const y = Math.sin(ang) * Math.sin(ringTilt) * SYSTEMS_RADIUS * 0.22;

            const g = new THREE.Group();
            g.position.set(x, y, z);

            // Core
            const core = new THREE.Mesh(
              new THREE.SphereGeometry(0.5, 24, 24),
              new THREE.MeshStandardMaterial({
                color: sys.color,
                emissive: sys.color,
                emissiveIntensity: 1.2,
                roughness: 0.3,
                metalness: 0.25
              })
            );
            g.add(core);

            // Inner halo
            const halo = new THREE.Mesh(
              new THREE.SphereGeometry(0.95, 16, 16),
              new THREE.MeshBasicMaterial({
                color: sys.color,
                transparent: true,
                opacity: 0.22,
                depthWrite: false,
                blending: THREE.AdditiveBlending
              })
            );
            g.add(halo);

            // Bloom sprite
            const bloom = new THREE.Sprite(new THREE.SpriteMaterial({
              map: sharedRadialTex,
              color: sys.color,
              transparent: true,
              opacity: 0.55,
              depthWrite: false,
              blending: THREE.AdditiveBlending
            }));
            bloom.scale.set(3.8, 3.8, 1);
            g.add(bloom);

            scene.add(g);

            const label = document.createElement('div');
            label.className = 'sys-label';
            const colHex = '#' + sys.color.toString(16).padStart(6, '0');
            label.style.setProperty('--lc', colHex);
            label.innerHTML =
              '<span class="tick"></span><span class="nm">' + sys.name + '</span>' +
              '<span class="tg">' + sys.tag + '</span>';
            systemLabelsHost.appendChild(label);

            systemNodes.push({
              group: g, core: core, halo: halo, bloom: bloom, label: label,
              color: new THREE.Color(sys.color),
              angle: ang, data: sys
            });
          }
        }

        // -------- 9 honey beams: brain core -> each system ------
        // Ribbon shader with traveling pulse head.
        let beamsGeom = null;
        let beamsMat  = null;
        let beamsMesh = null;
        {
          const SEG_PER_BEAM = 28;
          const beams = SYSTEMS.length;
          const vertsPerBeam = SEG_PER_BEAM * 6;
          const total = beams * vertsPerBeam;

          const positions = new Float32Array(total * 3);
          const aT        = new Float32Array(total);
          const aSide     = new Float32Array(total);
          const aBeamIdx  = new Float32Array(total);
          const aColor    = new Float32Array(total * 3);

          let v = 0;
          for (let b = 0; b < beams; b++) {
            const sys = SYSTEMS[b];
            const node = systemNodes[b];
            const target = node.group.position;
            const col = new THREE.Color(sys.color);
            // Beams start at brain surface, not 0,0,0 — gives that
            // "emerging from the cortex" look. Compute surface entry by
            // shrinking target dir to brain extent.
            const dirLen = Math.sqrt(target.x*target.x + target.y*target.y + target.z*target.z);
            const startScale = 4.0 / dirLen; // ~4 units = brain radius
            const sx = target.x * startScale;
            const sy = target.y * startScale;
            const sz = target.z * startScale;

            for (let s = 0; s < SEG_PER_BEAM; s++) {
              const t0 = s / SEG_PER_BEAM;
              const t1 = (s + 1) / SEG_PER_BEAM;
              const x0 = sx + (target.x - sx) * t0;
              const y0 = sy + (target.y - sy) * t0;
              const z0 = sz + (target.z - sz) * t0;
              const x1 = sx + (target.x - sx) * t1;
              const y1 = sy + (target.y - sy) * t1;
              const z1 = sz + (target.z - sz) * t1;

              const quad = [
                [x0, y0, z0, t0, -1],
                [x1, y1, z1, t1, -1],
                [x1, y1, z1, t1, +1],
                [x0, y0, z0, t0, -1],
                [x1, y1, z1, t1, +1],
                [x0, y0, z0, t0, +1]
              ];
              for (let q = 0; q < 6; q++) {
                positions[v*3+0] = quad[q][0];
                positions[v*3+1] = quad[q][1];
                positions[v*3+2] = quad[q][2];
                aT[v]      = quad[q][3];
                aSide[v]   = quad[q][4];
                aBeamIdx[v]= b;
                aColor[v*3+0] = col.r;
                aColor[v*3+1] = col.g;
                aColor[v*3+2] = col.b;
                v++;
              }
            }
          }

          beamsGeom = new THREE.BufferGeometry();
          beamsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
          beamsGeom.setAttribute('aT',       new THREE.BufferAttribute(aT, 1));
          beamsGeom.setAttribute('aSide',    new THREE.BufferAttribute(aSide, 1));
          beamsGeom.setAttribute('aBeamIdx', new THREE.BufferAttribute(aBeamIdx, 1));
          beamsGeom.setAttribute('aColor',   new THREE.BufferAttribute(aColor, 3));

          beamsMat = new THREE.ShaderMaterial({
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            uniforms: {
              uTime:  { value: 0 },
              uWidth: { value: 0.14 }
            },
            vertexShader: [
              'attribute float aT;',
              'attribute float aSide;',
              'attribute float aBeamIdx;',
              'attribute vec3  aColor;',
              'uniform float uWidth;',
              'varying float vT;',
              'varying float vSide;',
              'varying float vBeam;',
              'varying vec3  vCol;',
              'void main() {',
              '  vT = aT; vSide = aSide; vBeam = aBeamIdx; vCol = aColor;',
              '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
              '  mv.x += aSide * uWidth;',
              '  gl_Position = projectionMatrix * mv;',
              '}'
            ].join('\n'),
            fragmentShader: [
              'varying float vT;',
              'varying float vSide;',
              'varying float vBeam;',
              'varying vec3  vCol;',
              'uniform float uTime;',
              'void main() {',
              '  float edge = 1.0 - abs(vSide);',
              '  edge = pow(edge, 1.6);',
              '  float speed = 0.32;',
              '  float pulse = fract(vT - uTime * speed + vBeam * 0.13);',
              '  float head  = smoothstep(0.85, 1.0, pulse) - smoothstep(1.0, 1.06, pulse);',
              '  float idle  = 0.22 + 0.08 * sin(uTime * 1.1 + vT * 6.2832 + vBeam * 1.7);',
              '  float bright = idle + head * 1.8;',
              '  float taper = smoothstep(0.0, 0.06, vT) * smoothstep(1.0, 0.92, vT);',
              '  vec3 col = mix(vCol, vec3(1.0, 0.92, 0.62), head * 0.85);',
              '  float a  = edge * bright * taper * 0.66;',
              '  gl_FragColor = vec4(col, a);',
              '}'
            ].join('\n')
          });

          beamsMesh = new THREE.Mesh(beamsGeom, beamsMat);
          beamsMesh.frustumCulled = false;
          scene.add(beamsMesh);
        }

        // -------- Interaction: drag + scroll -------------------
        let userInteractedAt = 0;
        const AUTO_RESUME_AFTER = 5000;
        let dragging = false;
        let lastX = 0, lastY = 0;
        let autoYaw = 0;
        let yawOffset = 0;
        let pitchOffset = 0;
        let targetDist = 42;
        let cameraDist = 42;

        function onPointerDown(e) {
          dragging = true;
          lastX = e.clientX;
          lastY = e.clientY;
          userInteractedAt = performance.now();
          renderer.domElement.style.cursor = 'grabbing';
        }
        function onPointerMove(e) {
          if (!dragging) return;
          const dx = e.clientX - lastX;
          const dy = e.clientY - lastY;
          lastX = e.clientX;
          lastY = e.clientY;
          yawOffset   += dx * 0.005;
          pitchOffset += dy * 0.004;
          pitchOffset = Math.max(-0.8, Math.min(0.8, pitchOffset));
          userInteractedAt = performance.now();
        }
        function onPointerUp() {
          dragging = false;
          renderer.domElement.style.cursor = 'grab';
        }
        function onWheel(e) {
          e.preventDefault();
          targetDist += e.deltaY * 0.012;
          targetDist = Math.max(8, Math.min(55, targetDist));
          userInteractedAt = performance.now();
        }
        renderer.domElement.style.cursor = 'grab';
        renderer.domElement.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup',   onPointerUp);
        renderer.domElement.addEventListener('wheel', onWheel, { passive: false });

        // -------- Label projection -----------------------------
        const proj = new THREE.Vector3();
        function updateSystemLabels() {
          if (!systemNodes.length) return;
          const halfW = viewW * 0.5;
          const halfH = viewH * 0.5;
          for (let i = 0; i < systemNodes.length; i++) {
            const node = systemNodes[i];
            proj.copy(node.group.position);
            proj.project(camera);
            const x = proj.x * halfW + halfW;
            const y = -proj.y * halfH + halfH;
            const visible = proj.z < 1 && x > -120 && x < viewW + 120 &&
                            y > 60 && y < viewH - 140;
            const dx = x - halfW;
            const dy = y - halfH;
            const m = Math.sqrt(dx*dx + dy*dy) || 1;
            const ox = dx / m * 26;
            const oy = dy / m * 26;
            node.label.style.transform =
              'translate(' + (x + ox) + 'px, ' + (y + oy) + 'px) translate(-50%, -50%)';
            if (visible) {
              if (!node.label.classList.contains('show')) node.label.classList.add('show');
            } else {
              if (node.label.classList.contains('show')) node.label.classList.remove('show');
            }
          }
        }

        // -------- Surface node firing wave ---------------------
        // Every 4.5s a wave sweeps through the brain along a rotating
        // axis. Nodes near the wavefront flash bright; idle nodes
        // gently pulse. Implemented by re-writing the InstancedMesh
        // colors each frame. 1,500 instances × 3 floats = cheap.
        const _surfaceColors = new Float32Array(SURFACE_NODES * 3);
        const _cHoney  = new THREE.Color(HONEY);
        const _cWarm   = new THREE.Color(HONEY_WARM);
        const _cBright = new THREE.Color(0xfff3c7);
        let waveStart = 0;
        let waveDir = new THREE.Vector3(1, 0.25, 0.4).normalize();
        const WAVE_PERIOD = 4.5;
        const WAVE_DURATION = 2.0;
        function nextWaveDir(t) {
          const a = t * 0.17;
          const b = t * 0.11;
          waveDir.set(Math.cos(a), Math.sin(b) * 0.5, Math.sin(a)).normalize();
        }

        // -------- Animation loop -------------------------------
        let rafId = 0;
        let frameIdx = 0;
        const clock = new THREE.Clock();
        const _tmpMat = new THREE.Matrix4();
        const _tmpPos = new THREE.Vector3();
        const _tmpQuat = new THREE.Quaternion();
        const _tmpScale = new THREE.Vector3();
        _tmpQuat.identity();

        function tick() {
          const t = clock.getElapsedTime();
          frameIdx++;

          // Auto-rotate VERY slow: 180s revolution
          if (!reduced) autoYaw += 0.00058;

          // Camera dolly toward target
          cameraDist += (targetDist - cameraDist) * 0.06;

          brainRoot.rotation.y = autoYaw + yawOffset;
          brainRoot.rotation.x = THREE.MathUtils.degToRad(-8) + pitchOffset;

          // Camera position — slight drift after idle
          if (!reduced && (performance.now() - userInteractedAt) > AUTO_RESUME_AFTER) {
            const camAng = t * 0.018;
            const camY   = 1.6 + Math.sin(t * 0.12) * 0.5;
            camera.position.set(
              Math.sin(camAng) * cameraDist * 0.08,
              camY,
              cameraDist
            );
          } else {
            camera.position.z = cameraDist;
          }
          camera.lookAt(0, 0, 0);

          // Brain solid: subtle opacity breathing
          if (brainSolidMat) {
            brainSolidMat.opacity = 0.74 + Math.sin(t * 0.6) * 0.06;
          }
          if (brainWireMat) {
            brainWireMat.opacity = 0.40 + Math.sin(t * 0.6) * 0.08;
          }
          if (brainInnerMat) {
            brainInnerMat.opacity = 0.08 + Math.sin(t * 0.85) * 0.04;
          }

          // Core ember breath
          if (coreEmber) {
            const s = 1 + Math.sin(t * 1.4) * 0.08;
            coreEmber.scale.set(s, s, s);
            coreEmber.material.emissiveIntensity = 1.55 + Math.sin(t * 2.1) * 0.4;
          }
          if (coreCorona) {
            const s = 2.6 + Math.sin(t * 1.4) * 0.2;
            coreCorona.scale.set(s, s, 1);
            coreCorona.material.opacity = 0.45 + Math.sin(t * 2.1) * 0.10;
          }

          // Surface node firing wave -----------------------------
          if (surfaceInst) {
            const cyclePos = t - waveStart;
            if (cyclePos > WAVE_PERIOD) {
              waveStart = t;
              nextWaveDir(t);
            }
            const localT = t - waveStart;
            let wavePos = 0;
            let waveAmp = 0;
            if (localT < WAVE_DURATION) {
              const f = localT / WAVE_DURATION;
              wavePos = -8 + f * 16;
              waveAmp = Math.sin(f * Math.PI);
            }
            if (reduced) { wavePos = 0; waveAmp = 0; }

            const colors = surfaceInst.instanceColor.array;
            for (let i = 0; i < SURFACE_NODES; i++) {
              const d = surfaceNodeData[i];
              // Distance from wave plane
              const along = d.x * waveDir.x + d.y * waveDir.y + d.z * waveDir.z;
              const band = waveAmp * Math.exp(-Math.pow((along - wavePos) * 0.7, 2));
              // Idle pulse
              const idle = 0.55 + 0.18 * Math.sin(t * 1.8 + d.phase);
              const k = Math.min(1.0, idle + band * 1.4);
              const base = d.left ? _cHoney : _cWarm;
              // Blend base → bright by k
              const r = base.r * (1 - k * 0.45) + _cBright.r * (k * 0.45);
              const g = base.g * (1 - k * 0.45) + _cBright.g * (k * 0.45);
              const bl = base.b * (1 - k * 0.45) + _cBright.b * (k * 0.45);
              const mul = Math.min(1.0, 0.6 + k * 0.8);
              colors[i*3+0] = r * mul;
              colors[i*3+1] = g * mul;
              colors[i*3+2] = bl * mul;
            }
            surfaceInst.instanceColor.needsUpdate = true;
          }

          // MCP ring: slow counter-rotate + scale breath ---------
          if (mcpRing && !reduced) {
            mcpRing.rotation.y = t * 0.06;
          }
          if (mcpInst) {
            for (let i = 0; i < MCP_CLUSTERS; i++) {
              const ang = mcpBaseAngles[i];
              const x = Math.cos(ang) * MCP_RING_RADIUS;
              const z = Math.sin(ang) * MCP_RING_RADIUS;
              const y = Math.sin(t * 0.8 + mcpPhases[i]) * 0.18;
              const breath = 0.16 + Math.sin(t * 1.4 + mcpPhases[i]) * 0.03;
              _tmpPos.set(x, y, z);
              _tmpScale.set(breath, breath, breath);
              _tmpMat.compose(_tmpPos, _tmpQuat, _tmpScale);
              mcpInst.setMatrixAt(i, _tmpMat);
            }
            mcpInst.instanceMatrix.needsUpdate = true;
          }

          // System orbs gentle bob + counter-orbit ----------------
          for (let i = 0; i < systemNodes.length; i++) {
            const n = systemNodes[i];
            const ang = n.angle + (reduced ? 0 : t * 0.022);
            const px = Math.cos(ang) * SYSTEMS_RADIUS;
            const pz = Math.sin(ang) * SYSTEMS_RADIUS;
            const py = Math.sin(ang) * 0.22 * SYSTEMS_RADIUS * 0.18
                     + Math.sin(t * 0.6 + i) * 0.18;
            n.group.position.set(px, py, pz);
            const breath = 1 + Math.sin(t * 1.2 + i * 0.7) * 0.06;
            n.core.scale.set(breath, breath, breath);
            n.halo.material.opacity = 0.18 + Math.sin(t * 1.0 + i) * 0.06;
          }

          // Beams re-anchor every 4 frames -----------------------
          if (beamsGeom && (frameIdx % 4) === 0) {
            const positions = beamsGeom.attributes.position.array;
            const SEG_PER_BEAM = 28;
            for (let b = 0; b < SYSTEMS.length; b++) {
              const target = systemNodes[b].group.position;
              const dirLen = Math.sqrt(
                target.x*target.x + target.y*target.y + target.z*target.z) || 1;
              const startScale = 4.0 / dirLen;
              const sx = target.x * startScale;
              const sy = target.y * startScale;
              const sz = target.z * startScale;
              const base = b * SEG_PER_BEAM * 6 * 3;
              for (let s = 0; s < SEG_PER_BEAM; s++) {
                const t0 = s / SEG_PER_BEAM;
                const t1 = (s + 1) / SEG_PER_BEAM;
                const x0 = sx + (target.x - sx) * t0;
                const y0 = sy + (target.y - sy) * t0;
                const z0 = sz + (target.z - sz) * t0;
                const x1 = sx + (target.x - sx) * t1;
                const y1 = sy + (target.y - sy) * t1;
                const z1 = sz + (target.z - sz) * t1;
                const off = base + s * 6 * 3;
                positions[off+0]=x0; positions[off+1]=y0; positions[off+2]=z0;
                positions[off+3]=x1; positions[off+4]=y1; positions[off+5]=z1;
                positions[off+6]=x1; positions[off+7]=y1; positions[off+8]=z1;
                positions[off+9]=x0; positions[off+10]=y0; positions[off+11]=z0;
                positions[off+12]=x1; positions[off+13]=y1; positions[off+14]=z1;
                positions[off+15]=x0; positions[off+16]=y0; positions[off+17]=z0;
              }
            }
            beamsGeom.attributes.position.needsUpdate = true;
          }
          if (beamsMat) beamsMat.uniforms.uTime.value = t;

          if ((frameIdx & 1) === 0) updateSystemLabels();

          renderer.render(scene, camera);
          rafId = requestAnimationFrame(tick);
        }

        // -------- Resize ---------------------------------------
        function onResize() {
          const w = wrap.clientWidth, h = wrap.clientHeight;
          if (!w || !h) return;
          viewW = w; viewH = h;
          renderer.setSize(w, h, false);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
        }
        const ro = new ResizeObserver(onResize);
        ro.observe(wrap);

        rafId = requestAnimationFrame(tick);

        // -------- Init perf info -------------------------------
        renderer.render(scene, camera);
        try {
          const info = renderer.info;
          console.debug('[slide-07 brain]', {
            calls: info.render.calls,
            triangles: info.render.triangles,
            geometries: info.memory.geometries,
            textures: info.memory.textures,
            programs: info.programs ? info.programs.length : null,
            surfaceNodes: SURFACE_NODES,
            mcpClusters: MCP_CLUSTERS,
            systems: SYSTEMS.length
          });
        } catch (e) {}

        // -------- Cleanup --------------------------------------
        state = {
          dispose() {
            cancelAnimationFrame(rafId);
            ro.disconnect();
            renderer.domElement.removeEventListener('pointerdown', onPointerDown);
            window.removeEventListener('pointermove', onPointerMove);
            window.removeEventListener('pointerup',   onPointerUp);
            renderer.domElement.removeEventListener('wheel', onWheel);

            const disposedMats = new Set();
            const disposedGeos = new Set();
            const disposedTexs = new Set();

            function disposeMaterial(m) {
              if (!m || disposedMats.has(m)) return;
              disposedMats.add(m);
              for (const k in m) {
                const v = m[k];
                if (v && v.isTexture && !disposedTexs.has(v)) {
                  disposedTexs.add(v);
                  try { v.dispose(); } catch (_) {}
                }
              }
              try { m.dispose(); } catch (_) {}
            }

            scene.traverse(obj => {
              if (obj.geometry && !disposedGeos.has(obj.geometry)) {
                disposedGeos.add(obj.geometry);
                try { obj.geometry.dispose(); } catch (_) {}
              }
              if (obj.material) {
                if (Array.isArray(obj.material)) obj.material.forEach(disposeMaterial);
                else disposeMaterial(obj.material);
              }
            });

            try { sharedRadialTex.dispose(); } catch (_) {}
            try { brainWireGeom && brainWireGeom.dispose(); } catch (_) {}
            try { beamsGeom    && beamsGeom.dispose();    } catch (_) {}
            try { beamsMat     && beamsMat.dispose();     } catch (_) {}

            const lblHost = document.getElementById('brain-system-labels');
            if (lblHost) lblHost.innerHTML = '';
            const rowHost = document.getElementById('brain-system-row');
            if (rowHost) rowHost.innerHTML = '';

            while (scene.children.length) scene.remove(scene.children[0]);

            try { renderer.forceContextLoss && renderer.forceContextLoss(); } catch (_) {}
            try { renderer.dispose(); } catch (_) {}
            if (renderer.domElement.parentNode) {
              renderer.domElement.parentNode.removeChild(renderer.domElement);
            }
          }
        };
      }

      window.onSlideEnter[8] = function () {
        if (state) return;
        loadThree(initBrain);
      };

      window.onSlideLeave[8] = function () {
        if (state) {
          try { state.dispose(); } catch (e) { console.warn('[slide-07 brain] dispose error', e); }
          state = null;
        }
      };

      // Self-bootstrap if slide is already visible on load
      const slideEl = document.getElementById('slide-07-brain');
      if (slideEl) {
        const rect = slideEl.getBoundingClientRect();
        const visible = rect.width > 0 && rect.height > 0 &&
                        rect.top < window.innerHeight && rect.bottom > 0;
        if (visible) {
          requestAnimationFrame(() => window.onSlideEnter[8]());
        }
      }
    })();
  </script>
