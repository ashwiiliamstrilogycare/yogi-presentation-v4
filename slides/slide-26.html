  <style>
    /* ============================================================
       SLIDE 22 — OUTRO / Q&A · "Questions. Stand by for orders."
       Endcard. Symmetrical inverse of the cold open.
       Honey horizon. Quiet bear. Hold the room.
       ============================================================ */

    .slide[data-audio="26"] {
      --s22-bg:        #0a0d12;
      --s22-bg-deep:   #06080c;
      --s22-honey:     #FEBD33;
      --s22-honey-warm:#FFD06B;            /* slightly warmer endcard honey */
      --s22-honey-soft:rgba(254, 189, 51, 0.13);
      --s22-honey-glow:rgba(254, 189, 51, 0.55);
      --s22-honey-line:rgba(254, 189, 51, 0.85);
      --s22-teal:      #43C0BE;
      --s22-fg:        #f4f4f5;
      --s22-fg-muted:  #a1a1aa;
      --s22-fg-dim:    #71717a;
      --s22-fg-faint:  #52525b;
      --s22-border:    rgba(255, 255, 255, 0.06);
      --s22-border-warm: rgba(254, 189, 51, 0.22);

      position: relative;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 50% 60%, #0c1117 0%, var(--s22-bg) 55%, var(--s22-bg-deep) 100%);
      color: var(--s22-fg);
      font-family: 'Inter', system-ui, -apple-system, 'SF Pro Display', sans-serif;
      overflow: hidden;
      isolation: isolate;
      letter-spacing: -0.01em;
    }

    /* ---------- Atmosphere ---------- */
    .slide[data-audio="26"] .s22-atmos {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Warm ambient honey behind the wordmark — slowly breathes */
    .slide[data-audio="26"] .s22-ambient {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 110vmin;
      height: 110vmin;
      transform: translate(-50%, -50%);
      background: radial-gradient(
        circle at center,
        rgba(255, 208, 107, 0.16) 0%,
        rgba(254, 189, 51, 0.08) 22%,
        rgba(254, 189, 51, 0.025) 45%,
        transparent 68%
      );
      filter: blur(10px);
      opacity: 0;
      animation:
        s22-fade 2800ms cubic-bezier(0.16, 1, 0.3, 1) 300ms forwards,
        s22-breathe 9000ms ease-in-out 3200ms infinite;
    }

    /* Cool counter-wash near the bottom — subtle depth, not focal */
    .slide[data-audio="26"] .s22-counter {
      position: absolute;
      bottom: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 90vmin;
      height: 50vmin;
      background: radial-gradient(
        ellipse at center,
        rgba(67, 192, 190, 0.05) 0%,
        rgba(67, 192, 190, 0.015) 40%,
        transparent 65%
      );
      filter: blur(14px);
      opacity: 0;
      animation: s22-fade 3200ms cubic-bezier(0.16, 1, 0.3, 1) 600ms forwards;
    }

    /* Faint engineering grid — same DNA as slide 01 */
    .slide[data-audio="26"] .s22-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 96px 96px;
      mask-image: radial-gradient(ellipse at 50% 50%, black 0%, black 28%, transparent 72%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 0%, black 28%, transparent 72%);
      opacity: 0;
      animation: s22-fade 2000ms ease 700ms forwards;
    }

    /* Slow film grain — barely perceptible */
    .slide[data-audio="26"] .s22-grain {
      position: absolute;
      inset: -50%;
      background-image:
        radial-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 3px 3px;
      opacity: 0;
      animation:
        s22-fade 2000ms ease 1200ms forwards,
        s22-grain-drift 8000ms steps(2) infinite;
      mix-blend-mode: overlay;
    }

    /* ---------- Particles (drift up, fade off top) ---------- */
    .slide[data-audio="26"] .s22-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .slide[data-audio="26"] .s22-particle {
      position: absolute;
      bottom: -10px;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--s22-honey);
      box-shadow: 0 0 6px var(--s22-honey-glow);
      opacity: 0;
      animation: s22-drift linear infinite;
    }
    .slide[data-audio="26"] .s22-particle.dim {
      width: 1px;
      height: 1px;
      box-shadow: 0 0 3px rgba(254, 189, 51, 0.4);
    }

    /* ---------- Honey horizon line (the eye-rest) ---------- */
    .slide[data-audio="26"] .s22-horizon {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 26%;
      height: 1px;
      pointer-events: none;
      z-index: 1;
    }
    .slide[data-audio="26"] .s22-horizon::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 1px;
      width: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(254, 189, 51, 0.0) 8%,
        rgba(254, 189, 51, 0.45) 30%,
        rgba(254, 189, 51, 0.85) 50%,
        rgba(254, 189, 51, 0.45) 70%,
        rgba(254, 189, 51, 0.0) 92%,
        transparent 100%);
      box-shadow: 0 0 12px rgba(254, 189, 51, 0.35);
      animation: s22-draw 3400ms cubic-bezier(0.6, 0, 0.2, 1) 2200ms forwards;
    }
    /* Tiny anchor pip at horizon centre */
    .slide[data-audio="26"] .s22-horizon::after {
      content: '';
      position: absolute;
      left: 50%;
      top: -2px;
      width: 5px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: var(--s22-honey);
      box-shadow: 0 0 14px var(--s22-honey-glow), 0 0 4px var(--s22-honey-warm);
      opacity: 0;
      animation: s22-fade 1200ms ease 5400ms forwards;
    }

    /* ---------- Corner crosshairs (bookend, symmetry) ---------- */
    .slide[data-audio="26"] .s22-corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--s22-fg-faint);
      opacity: 0;
      animation: s22-fade 900ms ease 400ms forwards;
      z-index: 3;
    }
    .slide[data-audio="26"] .s22-corner.tl { top: 28px; left: 28px; border-top: 1px solid; border-left: 1px solid; }
    .slide[data-audio="26"] .s22-corner.tr { top: 28px; right: 28px; border-top: 1px solid; border-right: 1px solid; }
    .slide[data-audio="26"] .s22-corner.bl { bottom: 28px; left: 28px; border-bottom: 1px solid; border-left: 1px solid; }
    .slide[data-audio="26"] .s22-corner.br { bottom: 28px; right: 28px; border-bottom: 1px solid; border-right: 1px solid; }

    /* ---------- Frame ---------- */
    .slide[data-audio="26"] .s22-frame {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      padding: clamp(56px, 6vmin, 96px) clamp(56px, 7vmin, 112px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
    }

    /* ---------- Top eyebrow (centred, quiet) ---------- */
    .slide[data-audio="26"] .s22-top {
      text-align: center;
      opacity: 0;
      animation: s22-rise 1100ms cubic-bezier(0.16, 1, 0.3, 1) 800ms forwards;
    }
    .slide[data-audio="26"] .s22-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
      font-size: clamp(11px, 1.15vmin, 14px);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--s22-honey);
      font-weight: 500;
    }
    .slide[data-audio="26"] .s22-eyebrow .sep {
      color: var(--s22-fg-faint);
      letter-spacing: 0;
    }
    .slide[data-audio="26"] .s22-eyebrow .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--s22-honey);
      box-shadow: 0 0 12px var(--s22-honey-glow);
      animation: s22-pulse 3000ms ease-in-out infinite;
    }

    /* ---------- Centerpiece: "Questions." ---------- */
    .slide[data-audio="26"] .s22-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(40px, 5vmin, 80px);
      position: relative;
    }

    .slide[data-audio="26"] .s22-hero {
      position: relative;
      display: inline-block;
      font-size: clamp(96px, 14vw, 200px);
      font-weight: 800;
      letter-spacing: -0.055em;
      line-height: 0.92;
      color: var(--s22-honey-warm);
      text-shadow:
        0 0 32px rgba(254, 189, 51, 0.32),
        0 0 80px rgba(254, 189, 51, 0.16),
        0 0 140px rgba(254, 189, 51, 0.08);
      opacity: 0;
      transform: translateY(18px) scale(0.985);
      animation: s22-hero-in 1800ms cubic-bezier(0.16, 1, 0.3, 1) 1200ms forwards;
    }
    .slide[data-audio="26"] .s22-hero .period {
      color: var(--s22-honey);
      text-shadow:
        0 0 36px rgba(254, 189, 51, 0.55),
        0 0 100px rgba(254, 189, 51, 0.25);
    }

    /* Underline mark — slim honey line, hair below the wordmark */
    .slide[data-audio="26"] .s22-hero-mark {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(254, 189, 51, 0.7) 50%,
        transparent 100%);
      box-shadow: 0 0 8px rgba(254, 189, 51, 0.45);
      animation: s22-mark-grow 1800ms cubic-bezier(0.16, 1, 0.3, 1) 2400ms forwards;
    }

    /* ---------- Recap asks (3 lines, indented, left-aligned within the centred column) ---------- */
    .slide[data-audio="26"] .s22-recap {
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 1.6vmin, 22px);
      max-width: 640px;
      width: 100%;
    }
    .slide[data-audio="26"] .s22-ask {
      display: flex;
      align-items: baseline;
      gap: clamp(18px, 2vmin, 28px);
      opacity: 0;
      transform: translateY(8px);
      animation: s22-rise 900ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .slide[data-audio="26"] .s22-ask:nth-child(1) { animation-delay: 3000ms; }
    .slide[data-audio="26"] .s22-ask:nth-child(2) { animation-delay: 3180ms; }
    .slide[data-audio="26"] .s22-ask:nth-child(3) { animation-delay: 3360ms; }

    .slide[data-audio="26"] .s22-ask-chip {
      flex: 0 0 auto;
      width: 32px;
      height: 32px;
      border-radius: 4px;
      border: 1px solid var(--s22-border-warm);
      background: var(--s22-honey-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--s22-honey);
      font-weight: 600;
      box-shadow: 0 0 0 1px rgba(254, 189, 51, 0.05),
                  inset 0 0 12px rgba(254, 189, 51, 0.04);
    }
    .slide[data-audio="26"] .s22-ask-text {
      font-size: clamp(15px, 1.55vmin, 19px);
      line-height: 1.45;
      color: var(--s22-fg-muted);
      letter-spacing: -0.005em;
      font-weight: 400;
    }
    .slide[data-audio="26"] .s22-ask-text strong {
      color: var(--s22-fg);
      font-weight: 500;
    }
    .slide[data-audio="26"] .s22-ask-text .dot {
      color: var(--s22-fg-faint);
      margin: 0 12px;
      font-weight: 400;
    }

    /* ---------- Bottom strip ---------- */
    .slide[data-audio="26"] .s22-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
      opacity: 0;
      animation: s22-rise 1100ms cubic-bezier(0.16, 1, 0.3, 1) 3700ms forwards;
    }

    /* Far-bottom-left: end-of-briefing caption */
    .slide[data-audio="26"] .s22-end {
      font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
      font-size: clamp(10px, 1.05vmin, 12px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--s22-fg-dim);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .slide[data-audio="26"] .s22-end .pip {
      color: var(--s22-fg-faint);
    }
    .slide[data-audio="26"] .s22-end .live {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--s22-teal);
      box-shadow: 0 0 10px rgba(67, 192, 190, 0.7);
      animation: s22-pulse 2200ms ease-in-out infinite;
    }

    /* Far-bottom-right: bear silhouette + signature */
    .slide[data-audio="26"] .s22-sig {
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
      font-size: clamp(10px, 1.05vmin, 12px);
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: var(--s22-fg-dim);
    }
    .slide[data-audio="26"] .s22-sig-bear {
      width: 26px;
      height: 26px;
      display: inline-block;
      position: relative;
      color: var(--s22-honey);
      filter: drop-shadow(0 0 6px rgba(254, 189, 51, 0.45));
    }
    .slide[data-audio="26"] .s22-sig-bear svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .slide[data-audio="26"] .s22-sig .accent {
      color: var(--s22-honey);
    }
    .slide[data-audio="26"] .s22-sig .pip {
      color: var(--s22-fg-faint);
    }

    /* ---------- Animations ---------- */
    @keyframes s22-fade { to { opacity: 1; } }
    @keyframes s22-rise { to { opacity: 1; transform: translateY(0); } }
    @keyframes s22-hero-in {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes s22-mark-grow {
      to { width: min(420px, 60%); }
    }
    @keyframes s22-draw {
      to { width: 100%; }
    }
    @keyframes s22-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.45; transform: scale(0.85); }
    }
    @keyframes s22-breathe {
      0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 0.78; transform: translate(-50%, -50%) scale(1.04); }
    }
    @keyframes s22-grain-drift {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-1px, 1px); }
      50%  { transform: translate(1px, -1px); }
      75%  { transform: translate(-1px, -1px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes s22-drift {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      8%   { opacity: 0.75; }
      85%  { opacity: 0.55; }
      100% { transform: translateY(-110vh) translateX(var(--xdrift, 0px)); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide[data-audio="26"] *,
      .slide[data-audio="26"] *::before,
      .slide[data-audio="26"] *::after {
        animation-duration: 0.001ms !important;
        animation-delay: 0ms !important;
        transition: none !important;
      }
      .slide[data-audio="26"] .s22-hero { opacity: 1; transform: none; }
      .slide[data-audio="26"] .s22-hero-mark { width: 60%; }
      .slide[data-audio="26"] .s22-horizon::before { width: 100%; }
      .slide[data-audio="26"] .s22-particle { display: none; }
    }

    @media (max-width: 1280px) {
      .slide[data-audio="26"] .s22-ask-text { font-size: 15px; }
    }
  </style>

  <div class="content">

  <script>
    (function () {
      const root = document.currentScript.closest('.slide[data-audio="26"]');
      if (!root) return;
      const host = root.querySelector('#s22-particles');
      if (!host) return;

      // Respect reduced motion
      const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduced) return;

      // Build a modest field of drifting particles. Keep it sparse — restraint.
      const COUNT = 26;
      const frag = document.createDocumentFragment();
      for (let i = 0; i < COUNT; i++) {
        const p = document.createElement('span');
        p.className = 's22-particle' + (Math.random() > 0.55 ? ' dim' : '');
        const x = Math.random() * 100;            // left %
        const dur = 14 + Math.random() * 18;      // 14–32s (slow)
        const delay = -Math.random() * dur;       // negative so they're mid-flight on load
        const xdrift = (Math.random() * 60 - 30) + 'px';
        p.style.left = x + '%';
        p.style.animationDuration = dur + 's';
        p.style.animationDelay = delay + 's';
        p.style.setProperty('--xdrift', xdrift);
        frag.appendChild(p);
      }
      host.appendChild(frag);
    })();
  </script>
</section>
